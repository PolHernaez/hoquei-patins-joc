<line x1="215" y1="53" x2="370" y2="53" stroke="#aaa" stroke-width="0.5"/>
<text x="223" y="69" dominant-baseline="central" font-size="11" fill="#333">- nom: String</text>
<text x="223" y="89" dominant-baseline="central" font-size="11" fill="#333">- gols: int</text>
