<svg width="800" height="500" viewBox="0 0 680 455" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- === ROW 1: Model === -->

<!-- JUGADOR -->
<rect x="10" y="25" width="165" height="160" fill="#f9f9f9" stroke="#aaa" stroke-width="0.8" rx="4"/>
<rect x="10" y="25" width="165" height="28" fill="#ddd8f7" stroke="#aaa" stroke-width="0.8" rx="4"/>
<rect x="10" y="40" width="165" height="13" fill="#ddd8f7" stroke="none"/>
<text x="92" y="42" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#3a2f8a">Jugador</text>
<line x1="10" y1="53" x2="175" y2="53" stroke="#aaa" stroke-width="0.5"/>
<text x="18" y="69" dominant-baseline="central" font-size="11" fill="#333">- nom: String</text>
<text x="18" y="89" dominant-baseline="central" font-size="11" fill="#333">- energia: int</text>
<text x="18" y="109" dominant-baseline="central" font-size="11" fill="#333">- habilitat: int</text>
<line x1="10" y1="122" x2="175" y2="122" stroke="#aaa" stroke-width="0.5"/>
<text x="18" y="140" dominant-baseline="central" font-size="11" fill="#333">+ recuperarEnergia()</text>
<text x="18" y="160" dominant-baseline="central" font-size="11" fill="#333">+ getEstats()</text>

<!-- EQUIP -->
<rect x="215" y="25" width="155" height="115" fill="#f9f9f9" stroke="#aaa" stroke-width="0.8" rx="4"/>
