<svg width="500" height="580" viewBox="0 0 500 580" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- INICI -->
<ellipse cx="250" cy="28" rx="45" ry="20" fill="#555" stroke="#333" stroke-width="1"/>
<text x="250" y="28" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#fff">INICI</text>

<!-- Arrow 1 -->
<line x1="250" y1="48" x2="250" y2="63" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Iniciar Partit -->
<rect x="130" y="65" width="240" height="36" fill="#eef" stroke="#aaa" stroke-width="0.8" rx="4"/>
<text x="250" y="83" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#333">Iniciar Partit</text>

<!-- Arrow 2 -->
<line x1="250" y1="101" x2="250" y2="116" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Mostra estat -->
<rect x="100" y="118" width="300" height="36" fill="#eef" stroke="#aaa" stroke-width="0.8" rx="4"/>
<text x="250" y="136" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#333">Mostra estat: gols, torn, energia</text>

<!-- Arrow 3 -->
<line x1="250" y1="154" x2="250" y2="169" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Tria acció -->
<rect x="100" y="171" width="300" height="36" fill="#eef" stroke="#aaa" stroke-width="0.8" rx="4"/>
<text x="250" y="189" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#333">Tria acció (jugador o IA rival)</text>

<!-- Arrow 4 -->
<line x1="250" y1="207" x2="250" y2="222" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Calcula resultat -->
<rect x="100" y="224" width="300" height="36" fill="#eef" stroke="#aaa" stroke-width="0.8" rx="4"/>
<text x="250" y="242" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#333">Calcula resultat de l'acció</text>

<!-- Arrow 5 -->
<line x1="250" y1="260" x2="250" y2="275" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Actualitza estat -->
<rect x="100" y="277" width="300" height="36" fill="#eef" stroke="#aaa" stroke-width="0.8" rx="4"/>
<text x="250" y="295" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#333">Actualitza gols, energia i possessió</text>

<!-- Arrow 6 -->
<line x1="250" y1="313" x2="250" y2="338" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Diamond: Fi del joc? -->
<polygon points="250,340 350,365 250,390 150,365" fill="#fff8e0" stroke="#c8a020" stroke-width="1.2"/>
<text x="250" y="365" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#7a5500">Fi del joc?</text>

<!-- YES arrow down -->
<line x1="250" y1="390" x2="250" y2="415" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="260" y="405" dominant-baseline="central" font-size="11" fill="#555">Sí</text>

<!-- Mostra resultat -->
<rect x="130" y="417" width="240" height="36" fill="#eef" stroke="#aaa" stroke-width="0.8" rx="4"/>
<text x="250" y="435" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#333">Mostra resultat final</text>

<!-- Arrow to END -->
<line x1="250" y1="453" x2="250" y2="470" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- FI -->
<ellipse cx="250" cy="490" rx="45" ry="20" fill="#555" stroke="#333" stroke-width="1"/>
<text x="250" y="490" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#fff">FI</text>

<!-- NO loop back arrow -->
<path d="M150,365 L80,365 L80,136 L98,136" fill="none" stroke="#555" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text x="112" y="358" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#555">No</text>
</svg>
