<text x="18" y="326" dominant-baseline="central" font-size="11" fill="#333">TIRAR</text>
<text x="18" y="346" dominant-baseline="central" font-size="11" fill="#333">PASSAR</text>
<text x="18" y="366" dominant-baseline="central" font-size="11" fill="#333">DESCANSAR</text>
<text x="18" y="386" dominant-baseline="central" font-size="11" fill="#333">BLOQUEJAR</text>
<text x="18" y="406" dominant-baseline="central" font-size="11" fill="#333">PRESSIONAR</text>

<!-- IACONTROLLER -->
<rect x="215" y="265" width="155" height="70" fill="#f9f9f9" stroke="#aaa" stroke-width="0.8" rx="4"/>
<rect x="215" y="265" width="155" height="28" fill="#c8eee4" stroke="#aaa" stroke-width="0.8" rx="4"/>
<rect x="215" y="280" width="155" height="13" fill="#c8eee4" stroke="none"/>
<text x="292" y="282" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#0a5c42">IAController</text>
<line x1="215" y1="293" x2="370" y2="293" stroke="#aaa" stroke-width="0.5"/>
<text x="223" y="310" dominant-baseline="central" font-size="11" fill="#333">+ decideixAccio()</text>

<!-- GAMEPANEL -->
<rect x="415" y="265" width="255" height="100" fill="#f9f9f9" stroke="#aaa" stroke-width="0.8" rx="4"/>
<rect x="415" y="265" width="255" height="44" fill="#c8eee4" stroke="#aaa" stroke-width="0.8" rx="4"/>
<rect x="415" y="287" width="255" height="22" fill="#c8eee4" stroke="none"/>
<text x="542" y="280" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#0a5c42">GamePanel</text>
<text x="542" y="298" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#0a5c42">extends JPanel</text>
<line x1="415" y1="309" x2="670" y2="309" stroke="#aaa" stroke-width="0.5"/>
<text x="423" y="326" dominant-baseline="central" font-size="11" fill="#333">+ actualitzarUI()</text>
<text x="423" y="346" dominant-baseline="central" font-size="11" fill="#333">+ mostrarResultat()</text>

<!-- === ARROWS === -->
<!-- 1: Equip → Jugador -->
<line x1="213" y1="72" x2="177" y2="72" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
<!-- 2: Partit → Equip (x2) -->
<line x1="413" y1="55" x2="372" y2="55" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
<text x="392" y="48" text-anchor="middle" font-size="11" fill="#555">2</text>
<!-- 3: GamePanel ..> Partit -->
<line x1="542" y1="263" x2="542" y2="232" stroke="#555" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<!-- 4: IAController ..> AccioJoc -->
<line x1="213" y1="298" x2="177" y2="298" stroke="#555" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<!-- 5: GamePanel ..> IAController -->
<line x1="413" y1="305" x2="371" y2="305" stroke="#555" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

<!-- LLEGENDA -->
<line x1="215" y1="360" x2="250" y2="360" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
<text x="255" y="360" dominant-baseline="central" font-size="10" fill="#555">associació (has-a)</text>
<line x1="215" y1="378" x2="250" y2="378" stroke="#555" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text x="255" y="378" dominant-baseline="central" font-size="10" fill="#555">dependència (uses)</text>
</svg>
