<text x="423" y="89" dominant-baseline="central" font-size="11" fill="#333">- equipVisitant: Equip</text>
<text x="423" y="109" dominant-baseline="central" font-size="11" fill="#333">- torn: int</text>
<text x="423" y="129" dominant-baseline="central" font-size="11" fill="#333">- periode: int</text>
<text x="423" y="149" dominant-baseline="central" font-size="11" fill="#333">- possessio: String</text>
<line x1="415" y1="163" x2="670" y2="163" stroke="#aaa" stroke-width="0.5"/>
<text x="423" y="181" dominant-baseline="central" font-size="11" fill="#333">+ siguientTorn()</text>
<text x="423" y="201" dominant-baseline="central" font-size="11" fill="#333">+ haAcabat(): boolean</text>

<!-- === ROW 2: Lògica i UI === -->

<!-- ACCIOJOC enum -->
<rect x="10" y="265" width="165" height="170" fill="#f9f9f9" stroke="#aaa" stroke-width="0.8" rx="4"/>
<rect x="10" y="265" width="165" height="44" fill="#fde9c0" stroke="#aaa" stroke-width="0.8" rx="4"/>
<rect x="10" y="293" width="165" height="16" fill="#fde9c0" stroke="none"/>
